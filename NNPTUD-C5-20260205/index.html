<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4">Products Dashboard</h1>
        <div>
          <button id="btnCreate" class="btn btn-primary me-2">Create Item</button>
          <button id="btnExport" class="btn btn-outline-secondary">Export CSV</button>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-sm-6 mb-2">
          <input id="search" class="form-control" placeholder="Search by title...">
        </div>
        <div class="col-sm-6 text-sm-end">
          <label class="me-2">Page size</label>
          <select id="pageSize" class="form-select d-inline-block w-auto">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
          </select>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle" id="productsTable">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Image</th>
              <th>Title <button class="btn btn-sm btn-link p-0 ms-1" id="sortTitle">Sort</button></th>
              <th>Price <button class="btn btn-sm btn-link p-0 ms-1" id="sortPrice">Sort</button></th>
              <th>Category</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <nav>
        <ul class="pagination" id="pagination"></ul>
      </nav>
    </div>

    <!-- Detail / Edit Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Product Detail</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="detailForm">
              <input type="hidden" id="detailId">
              <div class="mb-3">
                <label class="form-label">Title</label>
                <input id="detailTitle" class="form-control">
              </div>
              <div class="mb-3">
                <label class="form-label">Price</label>
                <input id="detailPrice" type="number" step="0.01" class="form-control">
              </div>
              <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea id="detailDescription" class="form-control" rows="3"></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label">Category</label>
                <input id="detailCategory" class="form-control">
              </div>
              <div class="mb-3">
                <label class="form-label">Images (comma separated URLs)</label>
                <input id="detailImages" class="form-control">
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button id="saveBtn" class="btn btn-primary">Save</button>
            <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Create Modal -->
    <div class="modal fade" id="createModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Create Product</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="createForm">
              <div class="mb-3">
                <label class="form-label">Title</label>
                <input id="createTitle" class="form-control">
              </div>
              <div class="mb-3">
                <label class="form-label">Price</label>
                <input id="createPrice" type="number" step="0.01" class="form-control">
              </div>
              <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea id="createDescription" class="form-control" rows="3"></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label">Category</label>
                <input id="createCategory" class="form-control">
              </div>
              <div class="mb-3">
                <label class="form-label">Images (comma separated URLs)</label>
                <input id="createImages" class="form-control">
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button id="createSaveBtn" class="btn btn-primary">Create</button>
            <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
